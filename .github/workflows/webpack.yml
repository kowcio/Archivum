name: Build & Test

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox
      
      - name: Type check
        run: npm run type-check

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Build extensions (PRODUCTION MODE - DEV_FEATURES=false)
        run: npm run build

      - name: Create ZIP archives
        run: |
          wxt zip -b chrome --mv3
          wxt zip -b firefox --mv3
          wxt zip -b edge --mv3

      - name: Firefox manifest validation
        run: npx web-ext lint --source-dir .output/firefox-mv3

      - name: E2E tests - Playwright (DEVELOPER MODE - DEV_FEATURES=true)
        run: npm run test:playwright:chromium

      - name: Upload extension builds
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extension-builds
          path: .output/archivum-*.zip
          retention-days: 30
      
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            playwright-report/
            reports/
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox

      - name: Run release build
        # Note: Playwright tests already ran in DEV_FEATURES=true mode during build-and-test job
        # This release job only creates production ZIPs (DEV_FEATURES=false)
        run: npm run release

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: .output/archivum-*.zip
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## 📦 Extension Release ${{ steps.version.outputs.VERSION }}
            
            ### 📋 Packages
            - ✅ Chrome MV3 (.zip)
            - ✅ Firefox MV3 (.zip)
            - ✅ Edge MV3 (.zip)
            
            ### 🔍 Validation
            Firefox manifest validated via web-ext lint
            
            ### 📥 Installation
            1. Download the ZIP file for your browser
            2. Extract to a local folder
            3. Load in your browser's extension manager
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}





