name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [24]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        env:
          npm_config_legacy_peer_deps: true
      
      - name: Prepare Playwright browsers
        run: npx playwright install chromium firefox
      
      - name: Type check
        run: npm run type-check
      
      - name: Lint
        run: npm run lint -- --no-fix
        continue-on-error: true
      
      - name: Unit tests
        run: npm run test:unit
      
      - name: Build extension
        run: npm run build
      
      - name: Create ZIP archives
        run: npm run zip:all
      
      - name: Upload Chrome build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extension-chrome
          path: .output/*.zip
          retention-days: 30
      
      - name: Upload build output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: .output/
          retention-days: 7

  playwright-tests:
    runs-on: ubuntu-latest
    needs: build
    
    strategy:
      matrix:
        browser: ['chrome-mv3']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        env:
          npm_config_legacy_peer_deps: true
      
      - name: Prepare Playwright browsers
        run: npx playwright install chromium
      
      - name: Build extension (with DEV_FEATURES=true)
        run: npm run build:test:chrome
      
      - name: Run Playwright tests - ${{ matrix.browser }}
        run: npx playwright test -c playwright.config.ts --project ${{ matrix.browser }}
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

