name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_legacy_peer_deps: true

      - name: Prepare Playwright browsers
        run: npx playwright install chromium firefox

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint -- --no-fix
        continue-on-error: true

      - name: Unit tests
        run: npm run test:unit

      - name: Build extension
        run: npm run build

      - name: Create ZIP archives
        run: npm run zip:all

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"%h - %s (%an)" $(git describe --tags --abbrev=0 HEAD^)..HEAD || echo "Initial release")
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          release_name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## 📦 Release ${{ steps.version.outputs.VERSION }}
            
            ### 📝 Changes
            ```
            ${{ steps.changelog.outputs.CHANGELOG }}
            ```
            
            ### 📋 Build Info
            - **Node.js**: 22
            - **Build Date**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: ${{ github.sha }}
            
            ### 📥 Downloads
            - `extension-chrome-mv3.zip` - Chrome MV3 extension
            - `extension-firefox-mv3.zip` - Firefox MV3 extension
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

      - name: Upload Chrome extension as release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: .output/extension-chrome-mv3.zip
          asset_name: extension-chrome-mv3.zip
          asset_content_type: application/zip
        continue-on-error: true

      - name: Upload Firefox extension as release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: .output/extension-firefox-mv3.zip
          asset_name: extension-firefox-mv3.zip
          asset_content_type: application/zip
        continue-on-error: true

      - name: Publish release
        run: |
          echo "✅ Release ${{ steps.version.outputs.VERSION }} published successfully"
          echo "📦 Assets uploaded to GitHub Releases"

