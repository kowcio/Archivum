stages:
  - test
  - build
  - release

variables:
  NODE_VERSION: "22"
  npm_config_legacy_peer_deps: "true"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

# ===== TEST STAGE =====

test:unit:
  stage: test
  image: node:${NODE_VERSION}
  only:
    - main
    - develop
    - tags
  script:
    - npm ci
    - npm run test:unit
  artifacts:
    paths:
      - coverage/
    expire_in: 30 days
    when: always

# ===== BUILD STAGE =====

build:dev:
  stage: build
  image: node:${NODE_VERSION}
  only:
    - main
    - develop
  script:
    - npm ci
    - npm run type-check
    - npm run build
    - npm run zip:all
  artifacts:
    paths:
      - .output/
    expire_in: 7 days
  cache:
    paths:
      - node_modules/

# ===== RELEASE STAGE =====

release:wxt:
  stage: release
  image: node:${NODE_VERSION}
  only:
    - tags
  script:
    - npm ci
    - npm run type-check
    - npm run build
    - npm run zip:all
    - echo "Building WXT extension for distribution"
  artifacts:
    paths:
      - .output/extension-chrome-mv3.zip
      - .output/extension-firefox-mv3.zip
    name: "wxt-extension-${CI_COMMIT_TAG}"
    expire_in: 90 days
  release:
    tag_name: ${CI_COMMIT_TAG}
    description: |
      ## Release ${CI_COMMIT_TAG}

      ### WXT Browser Extension Release
      
      Built with WXT 0.20+ | Vue 3 | Pinia | TypeScript

      ### Downloads
      - **Chrome MV3**: extension-chrome-mv3.zip
      - **Firefox MV3**: extension-firefox-mv3.zip

      ### Build Info
      - **CI Pipeline**: ${CI_PIPELINE_URL}
      - **Commit**: ${CI_COMMIT_SHA}
      - **Tag**: ${CI_COMMIT_TAG}

      ### Installation
      See the README for installation instructions.
    assets:
      links:
        - name: Chrome MV3 Extension
        - name: Firefox MV3 Extension
  cache:
    paths:
      - node_modules/

